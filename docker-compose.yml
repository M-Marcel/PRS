services:
  postgres:
    image: postgres:16-alpine
    container_name: actx-postgres
    environment:
      POSTGRES_DB: actx_presale
      POSTGRES_USER: actx
      POSTGRES_PASSWORD: actx_dev
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U actx -d actx_presale"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  pgdata:
